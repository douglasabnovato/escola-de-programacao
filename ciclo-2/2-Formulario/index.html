<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscrição | ByteClass School</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --deep-green: #061a10;
        --emerald: #2ecc71;
        --glass: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-soft: #a0aec0;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
      }

      body {
        background: radial-gradient(
          circle at top,
          #0b3d26 0%,
          var(--deep-green) 100%
        );
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 40px 20px;
        text-align: center;
      }

      .progress-container {
        max-width: 400px;
        margin: 20px auto;
        background: rgba(255, 255, 255, 0.1);
        height: 4px;
        border-radius: 2px;
      }

      .progress-bar {
        height: 100%;
        background: var(--emerald);
        width: 33%;
        transition: 0.5s ease;
        box-shadow: 0 0 10px var(--emerald);
      }

      main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 20px;
      }

      .form-card {
        background: var(--glass);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        width: 100%;
        max-width: 600px;
        padding: 40px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
      }

      .step {
        display: none;
        animation: fadeIn 0.5s ease;
      }
      .step.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h2 {
        color: var(--emerald);
        margin-bottom: 10px;
        font-weight: 600;
      }
      p.subtitle {
        color: var(--text-soft);
        margin-bottom: 30px;
        font-size: 0.9rem;
      }

      .input-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.85rem;
        color: var(--text-soft);
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        transition: 0.3s;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--emerald);
        background: rgba(0, 0, 0, 0.5);
      }

      .radio-group {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }

      .radio-option {
        background: rgba(255, 255, 255, 0.05);
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        border: 1px solid transparent;
        transition: 0.2s;
      }

      .radio-option:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      input[type="radio"] {
        width: auto;
        margin-right: 10px;
      }

      .btn-group {
        display: flex;
        justify-content: space-between;
        margin-top: 30px;
      }

      button {
        padding: 14px 28px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
      }

      .btn-next {
        background: var(--emerald);
        color: var(--deep-green);
        flex: 1;
        margin-left: 10px;
      }
      .btn-prev {
        background: transparent;
        color: var(--text-soft);
        border: 1px solid var(--glass-border);
      }
      button:hover {
        opacity: 0.9;
        transform: translateY(-2px);
      }

      footer {
        padding: 20px;
        text-align: center;
        color: var(--text-soft);
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>ByteClass <span style="color: var(--emerald)">School</span></h1>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </header>

    <main>
      <div class="form-card">
        <form id="multiStepForm">
          <section class="step active" id="step1">
            <h2>Quem é você?</h2>
            <p class="subtitle">
              Vamos começar com o básico para te identificar.
            </p>

            <div class="input-group">
              <label>Nome Completo *</label>
              <input
                type="text"
                name="nome"
                required
                placeholder="Ex: Douglas Novato"
              />
            </div>
            <div class="input-group">
              <label>Idade *</label>
              <input
                type="number"
                name="idade"
                required
                placeholder="Sua idade"
              />
            </div>
            <div class="input-group">
              <label>WhatsApp (com DDD) *</label>
              <input
                type="tel"
                name="whatsapp"
                required
                placeholder="(32) 99999-9999"
              />
            </div>
            <div class="input-group">
              <label>E-mail (Opcional)</label>
              <input type="email" name="email" placeholder="seu@email.com" />
            </div>

            <div class="btn-group">
              <button type="button" class="btn-next" onclick="nextStep(2)">
                Próximo
              </button>
            </div>
          </section>

          <section class="step" id="step2">
            <h2>Sua Jornada</h2>
            <p class="subtitle">
              Conte-nos por que você decidiu estudar programação.
            </p>

            <div class="input-group">
              <label>Já teve contato com programação antes? *</label>
              <select name="experiencia" required>
                <option value="nunca">Nunca</option>
                <option value="vi-algo">Já vi algo, mas não pratiquei</option>
                <option value="estudei-pouco">Já estudei um pouco</option>
                <option value="conhecimento">Tenho conhecimento</option>
              </select>
            </div>

            <div class="input-group">
              <label>Qual seu principal objetivo?</label>
              <div class="radio-group">
                <label class="radio-option"
                  ><input type="radio" name="objetivo" value="carreira" /> Mudar
                  de carreira</label
                >
                <label class="radio-option"
                  ><input type="radio" name="objetivo" value="remoto" />
                  Trabalho remoto</label
                >
                <label class="radio-option"
                  ><input type="radio" name="objetivo" value="hobby" />
                  Hobby</label
                >
                <label class="radio-option"
                  ><input type="radio" name="objetivo" value="empreender" />
                  Criar próprios sistemas</label
                >
              </div>
            </div>

            <div class="btn-group">
              <button type="button" class="btn-prev" onclick="nextStep(1)">
                Voltar
              </button>
              <button type="button" class="btn-next" onclick="nextStep(3)">
                Próximo
              </button>
            </div>
          </section>

          <section class="step" id="step3">
            <h2>Aula Experimental 🚀</h2>
            <p class="subtitle">Garanta sua vaga na ByteClass.</p>

            <div class="input-group">
              <label>Qual turno você tem mais disponibilidade?</label>
              <select name="turno">
                <option value="manha">Manhã</option>
                <option value="tarde">Tarde</option>
                <option value="noite">Noite</option>
              </select>
            </div>

            <div class="input-group">
              <label>Dúvidas ou Expectativas?</label>
              <textarea
                name="duvidas"
                rows="4"
                placeholder="O que você espera aprender conosco?"
              ></textarea>
            </div>

            <div class="btn-group">
              <button type="button" class="btn-prev" onclick="nextStep(2)">
                Voltar
              </button>
              <button type="submit" class="btn-next">
                Finalizar Inscrição
              </button>
            </div>
          </section>
        </form>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 ByteClass School. Todos os direitos reservados.</p>
    </footer>

    <script>
      function nextStep(step) {
        // Esconde todos os passos
        document
          .querySelectorAll(".step")
          .forEach((s) => s.classList.remove("active"));
        // Mostra o passo atual
        document.getElementById("step" + step).classList.add("active");

        // Atualiza barra de progresso
        const progress = (step / 3) * 100;
        document.getElementById("progressBar").style.width = progress + "%";
      }

      document
        .getElementById("multiStepForm")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          alert("🚀 Inscrição enviada com sucesso! Bem-vindo à ByteClass.");
          // Aqui entraria a lógica de envio para API/Firebase
        });
    </script>
  </body>
</html>
